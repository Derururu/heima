<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学生成绩管理</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2937;
    }
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 16px;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 28px;
      font-weight: 700;
    }
    section {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }
    form, .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: #4b5563;
    }
    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
      background: #fff;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
    }
    button.secondary { background: #4b5563; }
    button.danger { background: #dc2626; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .status {
      min-height: 22px;
      margin: 0 0 12px;
      color: #4b5563;
      font-size: 14px;
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 560px;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 12px;
      text-align: left;
    }
    th {
      background: #f9fafb;
      color: #4b5563;
      font-size: 14px;
      font-weight: 700;
    }
    td:last-child, th:last-child { text-align: right; }
    @media (max-width: 720px) {
      form, .toolbar { grid-template-columns: 1fr; }
      main { padding: 20px 12px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>学生成绩管理</h1>

    <section>
      <h2>新增学生</h2>
      <form id="studentForm">
        <label>姓名
          <input id="name" name="name" required>
        </label>
        <label>科目
          <input id="subject" name="subject" required>
        </label>
        <label>成绩
          <input id="grade" name="grade" type="number" min="0" max="100" step="0.1" required>
        </label>
        <button type="submit">保存</button>
      </form>
    </section>

    <section>
      <h2>查询</h2>
      <div class="toolbar">
        <label>按科目筛选
          <input id="filterSubject" placeholder="例如 Math">
        </label>
        <button id="filterButton" type="button">筛选</button>
        <button id="reloadButton" class="secondary" type="button">全部学生</button>
      </div>
    </section>

    <section>
      <h2>学生列表</h2>
      <p id="status" class="status"></p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>姓名</th>
              <th>科目</th>
              <th>成绩</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="students"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const form = document.querySelector("#studentForm");
    const rows = document.querySelector("#students");
    const statusText = document.querySelector("#status");
    const filterSubject = document.querySelector("#filterSubject");

    async function request(url, options) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options
      });
      if (!response.ok) throw new Error(`请求失败：${response.status}`);
      return response.status === 204 ? null : response.json().catch(() => null);
    }

    function render(students) {
      rows.innerHTML = students.map(student => `
        <tr>
          <td>${student.id ?? ""}</td>
          <td>${student.name ?? ""}</td>
          <td>${student.subject ?? ""}</td>
          <td>${student.grade ?? ""}</td>
          <td><button class="danger" data-id="${student.id}">删除</button></td>
        </tr>
      `).join("");
      statusText.textContent = students.length ? `共 ${students.length} 条记录` : "暂无数据";
    }

    async function loadStudents(subject = "") {
      statusText.textContent = "加载中...";
      const url = subject ? `/students/subject/${encodeURIComponent(subject)}` : "/students";
      render(await request(url));
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(form));
      data.grade = Number(data.grade);
      await request("/students", { method: "POST", body: JSON.stringify(data) });
      form.reset();
      await loadStudents(filterSubject.value.trim());
    });

    rows.addEventListener("click", async event => {
      const id = event.target.dataset.id;
      if (!id) return;
      await request(`/students/${id}`, { method: "DELETE" });
      await loadStudents(filterSubject.value.trim());
    });

    document.querySelector("#filterButton").addEventListener("click", () => {
      loadStudents(filterSubject.value.trim()).catch(error => statusText.textContent = error.message);
    });

    document.querySelector("#reloadButton").addEventListener("click", () => {
      filterSubject.value = "";
      loadStudents().catch(error => statusText.textContent = error.message);
    });

    loadStudents().catch(error => statusText.textContent = error.message);
  </script>
</body>
</html>
